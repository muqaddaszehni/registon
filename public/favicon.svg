<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cobalt rounded-square background -->
  <rect width="64" height="64" rx="12" fill="#1a3a6b"/>
  <!-- Onion dome body (turquoise) -->
  <!-- The dome sits on a short drum; onion shape via a path -->
  <path d="M32 10
    C22 10 16 18 16 26
    C16 32 20 36 24 38
    L24 46
    L40 46
    L40 38
    C44 36 48 32 48 26
    C48 18 42 10 32 10Z"
    fill="#2cbfbf"/>
  <!-- Drum base -->
  <rect x="24" y="46" width="16" height="4" rx="1" fill="#20a0a0"/>
  <!-- Finial stem -->
  <rect x="31" y="5" width="2" height="7" rx="1" fill="#e8c96a"/>
  <!-- Finial ball -->
  <circle cx="32" cy="5" r="2.5" fill="#e8c96a"/>
</svg>
