<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Registon — Walk the Registan of Samarkand</title>
  <meta name="description" content="Step inside Registan Square — Samarkand's golden-hour plaza of cobalt tiles, soaring minarets, and six centuries of history, rendered in an interactive 3D world." />
  <meta name="theme-color" content="#7b4fa6" />
  <meta property="og:title" content="Registon — Walk the Registan of Samarkand" />
  <meta property="og:description" content="Step inside Registan Square — Samarkand's golden-hour plaza of cobalt tiles, soaring minarets, and six centuries of history, rendered in an interactive 3D world." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Body (EN): Cormorant Garamond (Latin + Tajik Cyrillic-ext: ғ ӯ ҳ ҷ). -->
  <!-- EN display titles: Reem Kufi (Kufic, echoes the madrasa tile calligraphy; Latin only — no Cyrillic). -->
  <!-- TJ display titles: Noto Nastaliq Urdu (Perso-Arabic Nastaliq — authentic Samarkand inscription script). -->
  <!-- TJ body: Yeseva One (elegant Cyrillic, covers Tajik ғ ӯ ҳ ҷ). -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Nastaliq+Urdu:wght@400;500;700&family=Yeseva+One&family=Reem+Kufi:wght@500;600;700&display=swap" />
  <style>
    /* Mobile: the app owns ALL gestures. touch-action:none stops iOS/Android from
       hijacking pan/zoom/double-tap; overscroll-behavior:none kills rubber-banding. */
    html, body {
      margin: 0; height: 100%; overflow: hidden; background: #f5c9a0;
      overscroll-behavior: none; -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app, #app canvas { position: fixed; inset: 0; touch-action: none; }
    #ui { position: fixed; inset: 0; pointer-events: none; font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; }
    #ui > * { pointer-events: auto; }
    /* Buttons/cards: allow taps without the 300ms delay, no double-tap zoom. */
    #ui button, #ui .langtoggle { touch-action: manipulation; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ui"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
